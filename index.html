<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine — Visão IA</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,500;0,700;1,300&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0a0c10;
      --surface:   #111318;
      --border:    #1e2230;
      --accent:    #00e5ff;
      --accent2:   #7c4dff;
      --success:   #00e676;
      --text:      #e8eaf0;
      --muted:     #5a6075;
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
    }

    /* ── Ambient glow ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse at center,
        rgba(0,229,255,.07) 0%,
        rgba(124,77,255,.05) 50%,
        transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .app-header {
      text-align: center;
      margin-bottom: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .app-header .badge-tag {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(0,229,255,.3);
      background: rgba(0,229,255,.06);
      padding: .25rem .75rem;
      border-radius: 100px;
      margin-bottom: 1rem;
    }

    .app-header h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      line-height: 1.2;
      background: linear-gradient(120deg, #e8eaf0 30%, var(--accent) 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-header p {
      color: var(--muted);
      font-size: .95rem;
      margin-top: .5rem;
    }

    /* ── Card ── */
    .card-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* ── Webcam container ── */
    #webcam-container {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: calc(var(--radius) - 4px);
      overflow: hidden;
      background: #0d0f14;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 1.5rem;
    }

    #webcam-container canvas {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    .webcam-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      color: var(--muted);
    }

    .webcam-placeholder i {
      font-size: 3rem;
      opacity: .4;
    }

    .webcam-placeholder span {
      font-size: .85rem;
    }

    /* ── Start button ── */
    .btn-start {
      width: 100%;
      padding: .85rem 1.5rem;
      border-radius: calc(var(--radius) - 4px);
      border: none;
      background: linear-gradient(135deg, var(--accent2) 0%, var(--accent) 100%);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(0,229,255,.18), 0 4px 15px rgba(124,77,255,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      margin-bottom: 1.75rem;
    }

    .btn-start:hover:not(:disabled) {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0,229,255,.28), 0 8px 20px rgba(124,77,255,.3);
    }

    .btn-start:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-start:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* ── Section title ── */
    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Label / progress rows ── */
    #label-container {
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }

    .prediction-row {
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }

    .prediction-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .prediction-name {
      font-size: .85rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    .prediction-pct {
      font-family: 'Space Mono', monospace;
      font-size: .8rem;
      color: var(--accent);
      min-width: 3.5rem;
      text-align: right;
    }

    .progress-track {
      width: 100%;
      height: 7px;
      background: rgba(255,255,255,.07);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      width: 0%;
      transition: width .25s ease, background .3s ease;
    }

    .progress-fill.high {
      background: linear-gradient(90deg, #00c853, var(--success));
      box-shadow: 0 0 8px rgba(0,230,118,.4);
    }

    /* ── Status indicator ── */
    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: .4rem;
      transition: background .3s;
    }

    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .status-text {
      font-family: 'Space Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
    }

    .status-text.active { color: var(--success); }

    /* ── Footer ── */
    .footer-note {
      margin-top: 2rem;
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
      z-index: 1;
      position: relative;
    }

    /* ── Responsive tweaks ── */
    @media (max-width: 400px) {
      .card-panel { padding: 1.25rem; }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="app-header">
    <div class="badge-tag"><i class="bi bi-cpu"></i> &nbsp;Teachable Machine</div>
    <h1>Visão com IA</h1>
    <p>Reconhecimento de imagem em tempo real via webcam</p>
  </header>

  <!-- Main card -->
  <div class="card-panel">

    <!-- Status row -->
    <div class="d-flex align-items-center mb-3">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Aguardando inicialização</span>
    </div>

    <!-- Webcam -->
    <div id="webcam-container">
      <div class="webcam-placeholder" id="placeholder">
        <i class="bi bi-camera-video-off"></i>
        <span>Câmera inativa</span>
      </div>
    </div>

    <!-- Button -->
    <button class="btn-start" id="btn-init" onclick="init()">
      <i class="bi bi-camera-video-fill"></i>
      Ativar Câmera &amp; Iniciar
    </button>

    <!-- Predictions -->
    <div class="section-title"><i class="bi bi-bar-chart-fill me-1"></i> Predições</div>
    <div id="label-container">
      <p style="color:var(--muted);font-size:.85rem;">
        Inicie o modelo para ver as predições aqui.
      </p>
    </div>

  </div>

  <p class="footer-note">
    Modelo hospedado no <strong style="color:var(--text)">Teachable Machine</strong> &mdash; Google Creative Lab
  </p>

  <!-- TensorFlow + Teachable Machine -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/2F2J71hTSJ/";
    let model, webcam, maxPredictions;

    // Color palette cycling for each class bar
    const GRADIENTS = [
      ['#7c4dff','#00e5ff'],
      ['#f50057','#ff6d00'],
      ['#00bcd4','#1de9b6'],
      ['#ff6f00','#ffca28'],
      ['#6200ea','#e040fb'],
    ];

    async function init() {
      const btn = document.getElementById('btn-init');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Carregando modelo…';

      setStatus('Carregando modelo…', false);

      try {
        const modelURL    = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model          = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Acessando câmera…';
        setStatus('Solicitando acesso à câmera…', false);

        const flip = true;
        webcam = new tmImage.Webcam(400, 400, flip);
        await webcam.setup();
        await webcam.play();

        // Swap placeholder for canvas
        const container = document.getElementById('webcam-container');
        document.getElementById('placeholder').remove();
        container.appendChild(webcam.canvas);

        // Build prediction rows
        buildPredictionUI();

        // Hide / update button
        btn.style.display = 'none';
        setStatus('Modelo ativo — reconhecendo…', true);

        window.requestAnimationFrame(loop);
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-clockwise me-2"></i> Tentar novamente';
        setStatus('Erro ao inicializar. Verifique permissões.', false);
      }
    }

    function setStatus(msg, active) {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      text.textContent = msg;
      dot.classList.toggle('active', active);
      text.classList.toggle('active', active);
    }

    function buildPredictionUI() {
      const container = document.getElementById('label-container');
      container.innerHTML = '';

      for (let i = 0; i < maxPredictions; i++) {
        const [c1, c2] = GRADIENTS[i % GRADIENTS.length];

        const row = document.createElement('div');
        row.className = 'prediction-row';
        row.id = `row-${i}`;

        row.innerHTML = `
          <div class="prediction-meta">
            <span class="prediction-name" id="name-${i}">Classe ${i + 1}</span>
            <span class="prediction-pct" id="pct-${i}">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="bar-${i}" style="background: linear-gradient(90deg,${c1},${c2})"></div>
          </div>`;

        container.appendChild(row);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const pct  = Math.round(prob * 100);

        document.getElementById(`name-${i}`).textContent = prediction[i].className;
        document.getElementById(`pct-${i}`).textContent  = pct + '%';

        const bar = document.getElementById(`bar-${i}`);
        bar.style.width = pct + '%';

        // Highlight dominant class
        if (pct >= 75) {
          bar.classList.add('high');
        } else {
          bar.classList.remove('high');
        }
      }
    }
  </script>
</body>
</html>
